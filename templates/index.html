<!DOCTYPE html>
<html>
<head>
    <title>RainPredict</title>
    <style>
        body { font-family: Arial; max-width: 850px; margin: 40px auto; padding: 20px; background: #f1f8f5; color: #173b35; }
        h1 { color: #16805f; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px #0001; margin-bottom: 20px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 13px 20px; background: #16805f; color: white; border: 0; border-radius: 8px; cursor: pointer; }
        #result { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🌧️ RainPredict</h1>
    <p>Predictive Irrigation Management Using Weather Forecasting</p>

    <div class="card">
        <h2>Enter Weather Data</h2>
        <form id="form">
            <label>Temperature (°C)<input id="temperature" type="number" value="28" step="0.1" required></label>
            <label>Humidity (%)<input id="humidity" type="number" value="75" step="0.1" required></label>
            <label>Wind Speed (km/h)<input id="wind_speed" type="number" value="10" step="0.1" required></label>
            <label>Pressure (hPa)<input id="pressure" type="number" value="1005" step="0.1" required></label>
            <label>Cloud Cover (%)<input id="cloud_cover" type="number" value="70" step="0.1" required></label>
            <label>Previous Rainfall (mm)<input id="previous_rainfall" type="number" value="10" step="0.1" required></label>
            <button type="submit">Predict Rainfall</button>
        </form>
    </div>

    <div class="card" id="result">
        Enter weather conditions and click Predict Rainfall.
    </div>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        temperature: document.getElementById("temperature").value,
        humidity: document.getElementById("humidity").value,
        wind_speed: document.getElementById("wind_speed").value,
        pressure: document.getElementById("pressure").value,
        cloud_cover: document.getElementById("cloud_cover").value,
        previous_rainfall: document.getElementById("previous_rainfall").value
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if (result.success) {
        document.getElementById("result").innerHTML =
            "<h2>" + result.prediction + "</h2>" +
            "<p>Rainfall Probability: <b>" + result.rain_probability + "%</b></p>" +
            "<p>💧 <b>Irrigation Recommendation:</b> " + result.irrigation_advice + "</p>";
    } else {
        document.getElementById("result").innerHTML = "Error: " + result.error;
    }
});
</script>
</body>
</html>
